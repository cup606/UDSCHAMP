<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>UDX Champions</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

<style>
body {
    background-image: url("bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    font-family: 'Black Ops One', sans-serif;
    text-align: center;
}

h1 {
    margin-top: 50px;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.card {
    border: 2px solid white;
    padding: 20px;
    margin: 15px;
    width: 300px;
    border-radius: 10px;
}
</style>
</head>

<body>

<h1> Hall of Fame</h1>

<div class="container" id="champions"></div>

<script>
// 🔥 ВОТ ТУТ ТЫ МЕНЯЕШЬ ДАННЫЕ
const data = [
    { season: "Season 1", name: "Brembo" },
    { season: "Season 2", name: "Brembo" },
    { season: "Season 3", name: "Cup" },
    { season: "Season 4", name: "Brembo" },
    { season: "Season 5", name: "Brembo" },
    { season: "Season 6", name: "Gwizex" },
    { season: "Season 7", name: "Seen" }
];

// ❗ ЭТО НЕ ТРОГАЙ
const container = document.getElementById("champions");

data.forEach(champ => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
        <h2>${champ.season}</h2>
        <p> ${champ.name}</p>
    `;

    container.appendChild(div);
});
</script>

</body>
</html>
