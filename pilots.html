<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pilots</title>

<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    color:white;
    font-family:'Black Ops One',sans-serif;

    background-image:url("bg.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

.overlay{
    min-height:100vh;
    background:rgba(0,0,0,0.75);

    padding:40px;
}

h1{
    text-align:center;
    font-size:50px;

    margin-bottom:40px;
}

.pilots-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

    gap:25px;
}

.pilot-card{

    background:rgba(255,255,255,0.08);

    border:2px solid white;

    border-radius:20px;

    padding:20px;

    text-align:center;

    transition:0.2s;

    cursor:pointer;

    backdrop-filter:blur(5px);
}

.pilot-card:hover{

    transform:scale(1.03);

    background:rgba(255,255,255,0.15);
}

.pilot-name{

    font-size:32px;

    margin-bottom:15px;
}

.pilot-elo{

    font-size:22px;
}

</style>
</head>

<body>

<div class="overlay">

<h1>PILOTS</h1>

<div class="pilots-grid" id="pilots-grid">

</div>

</div>

<script>

fetch("./drivers.json?v=" + Date.now())

.then(response => response.json())

.then(data => {

    const grid = document.getElementById("pilots-grid");

    const pilots = Object.entries(data);

    pilots.sort((a,b) => b[1].elo - a[1].elo);

    for (const [name, pilot] of pilots){

        const card = document.createElement("div");

        card.className = "pilot-card";

        card.onclick = () => {

            window.location.href =
            `pilot2.html?id=${name}`;
        };

        card.innerHTML = `

            <div class="pilot-name">
                ${name}
            </div>

            <div class="pilot-elo">
                ⭐ ${pilot.elo}
            </div>

        `;

        grid.appendChild(card);
    }

})

.catch(error => {

    document.body.innerHTML =
    "<h1>ERROR LOADING PILOTS</h1>";

    console.log(error);

});

</script>

</body>
</html>
